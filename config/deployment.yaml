# Coltex Deployment Configuration
# Docs: docs/deployment/self-hosted.md

deployment:
  mode: self-hosted
  tagline: "Commercial RAG corpus — 100,000,000+ documents"

  # Active profile: lan | production
  profile: lan

  profiles:
    lan:
      description: "LAN deployment — accessible to devices on your network"
      host: "0.0.0.0"
      port: 8080
      protocol: http
    production:
      description: "Production deployment with domain and TLS"
      host: "0.0.0.0"
      port: 443
      protocol: https

  # Override profile settings (leave null to use profile defaults)
  server:
    host: null
    port: null

  protocol: null  # http | https

  # Public-facing domain (e.g. knowledge.company.com)
  domain: ""

  # Full public URL override (e.g. https://knowledge.company.com)
  public_url: ""

  ssl:
    enabled: false
    cert_file: "config/certs/cert.pem"
    key_file: "config/certs/key.pem"

  networking:
    allow_remote: true
    trusted_proxies: []
    cors_origins:
      - "*"

  # Console bind name (shown in UI)
  studio:
    name: "Coltex Console"
