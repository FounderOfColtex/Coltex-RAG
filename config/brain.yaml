# Coltex configuration — Advanced Knowledge Corpus (Knowledge Architecture v2)

knowledge_base:
  paths:
    - knowledge-base
    - knowledge-base/knowledge-corpus
    - knowledge-base/distributable/_samples
  glob: "**/*.md"
  exclude:
    - "**/_seed/**"
    - "**/_excluded_from_distribution/**"
    - "**/generated/**"

embeddings:
  model: sentence-transformers/all-MiniLM-L6-v2

vector_store:
  persist_dir: data/brain/vector_store
  collection_name: coltex

graph:
  enabled: true
  advanced_routing: true
  max_hops: 4
  max_extra_chunks: 16

retrieval:
  vector_top_k: 15
  metadata_top_k: 12
  final_top_k: 12
  max_context_chars: 20000
  source_weights:
    vector: 1.0
    metadata: 0.88
    graph: 0.75

architecture:
  config_path: config/brain_architecture.yaml
  codename: knowledge_architecture
  version: "2.0"

document_types:
  - documentation
  - faq
  - api_reference
  - architecture_decision
  - design_document
  - runbook
  - troubleshooting
  - code_walkthrough
  - sql_example
  - database_schema
  - migration_guide
  - incident_report
  - code_review
  - guide
  - tutorial
  - benchmark
  - evaluation
  - best_practices
  - deep_dive
  - anti_patterns
  - case_study
  - domain_route
  - graph_link_map

relationship_types:
  - depends_on
  - uses
  - implements
  - calls
  - owned_by
  - documents
  - fixes
  - replaces
  - see_also
  - extends
  - validates
  - synthesizes
  - triggers
  - derived_from
  - tested_by
  - deployed_via

knowledge_hubs:
  - auth_service
  - indexing_pipeline
  - graphrag_engine
  - payment_service
  - ci_cd_platform
  - vector_store_cluster
  - embedding_service
  - agent_orchestrator
  - observability_stack
  - rag_retrieval_core
  - security_operations
  - data_pipeline
  - llm_inference_gateway
  - knowledge_graph_store
  - incident_command
  - ml_training_pipeline
  - api_gateway
  - coltex_knowledge_core
