# Zypher brain — corpus generation settings
# Generates connected documents with rich relationship graphs

seed_dir: knowledge-base
output_dir: knowledge-base/generated

scale: 1000
variations_per_doc: 12
max_files_per_category: 0
write_catalog: true
parallel_workers: 4

