# Coltex Knowledge Architecture v2 — Advanced Knowledge Corpus Architecture

architecture:
  version: "2.0"
  codename: knowledge_architecture

knowledge_corpus:
  root: knowledge-base/knowledge-corpus
  catalog_index: data/brain/catalog-index.json
  architecture_manifest: data/brain/architecture-manifest.json

  regions:
    processing_layers: processing-layers
    clusters: clusters
    domains: domains
    hubs: hubs
    graph_links: graph-links
    domain_routes: domain-routes
    memory: memory
    retention: retention
    automation: automation
    operations: operations
    routing: routing
    priority: priority
    quick_reference: quick-reference

  bootstrap:
    default_grow: 500
    advanced_grow: 1000
    mega_grow: 10000

  graph:
    advanced_routing: true
    max_hops: 4
    max_domain_routes: 90
    relationship_types: 20
