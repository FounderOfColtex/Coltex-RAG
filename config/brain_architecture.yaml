# Coltex Advanced Knowledge Corpus Architecture
# Multi-layer knowledge system — functional clusters, domain routes, memory tiers, processing layers

architecture:
  version: "2.0"
  codename: knowledge_architecture
  tiers:
    - ingestion      # L1 document intake
    - association    # L2-L4 domain linking
    - executive      # L5-L6 context assembly & governance
    - operations     # quick reference, runbooks, health checks

# ─── Processing layers (L1–L6) ───────────────────────────────────────────────
processing_layers:
  L1_ingestion:
    path: processing-layers/L1-ingestion
    role: Raw document ingestion, chunk boundaries, embedding triggers
    latency_ms: 5
  L2_metadata:
    path: processing-layers/L2-metadata
    role: Domain tagging, metadata extraction, initial graph edges
    latency_ms: 15
  L3_integration:
    path: processing-layers/L3-integration
    role: Cross-domain pattern matching, hub assignment
    latency_ms: 30
  L4_graph:
    path: processing-layers/L4-graph
    role: Multi-hop GraphRAG, graph-link traversal, ADR chains
    latency_ms: 80
  L5_assembly:
    path: processing-layers/L5-assembly
    role: Context assembly, reranking, faithfulness checks
    latency_ms: 120
  L6_governance:
    path: processing-layers/L6-governance
    role: Corpus identity, architecture docs, catalog orchestration
    latency_ms: 200

# ─── Functional clusters (domain groupings) ────────────────────────────────
functional_clusters:
  architecture:
    path: clusters/architecture
    role: Planning, ADRs, architecture decisions, agentic workflows
    domains: [architecture, agentic, api_design, microservices, clean_architecture, domain_driven_design]
  retrieval:
    path: clusters/retrieval
    role: Language models, embeddings, NLP, prompt engineering
    domains: [rag, embeddings, prompt_engineering, fine_tuning, chunking, retrieval]
  data:
    path: clusters/data
    role: Data structures, SQL, vector math, indexing
    domains: [sql, postgresql, mongodb, redis, vector_stores, vector_search, indexing]
  observability:
    path: clusters/observability
    role: Observability signals, dashboards, tracing patterns
    domains: [observability, performance, debugging, mlops]
  security:
    path: clusters/security
    role: Access control, incidents, compliance, data quality
    domains: [security, incidents, memory, data_quality]
  automation:
    path: automation
    role: CI/CD, infrastructure automation, deployment pipelines
    domains: [ci_cd, docker, kubernetes, github_actions, gitlab_ci, terraform]
  operations:
    path: operations
    role: Always-on runbooks, health checks, platform operations
    domains: [runbook, incidents, linux, nginx]
  retention:
    path: retention
    role: Long-term memory consolidation, episodic recall
    memory_tiers: [episodic, semantic, procedural]
  routing:
    path: routing
    role: Query routing to correct cluster and domain
    domains: [graphrag, retrieval, vector_search]
  priority:
    path: priority
    role: Priority and alert routing — security, incidents, SLA breaches
    domains: [security, incidents, performance]

# ─── Memory tiers ──────────────────────────────────────────────────────────
memory:
  working:
    path: memory/working
    capacity_docs: 1000
    ttl_hours: 24
    role: Active session context, recent queries
  episodic:
    path: memory/episodic
    capacity_docs: 50000
    role: Incident timelines, meeting notes, release events
  semantic:
    path: memory/semantic
    capacity_docs: 500000
    role: Stable facts, ADRs, API contracts, schemas
  procedural:
    path: memory/procedural
    capacity_docs: 100000
    role: Runbooks, tutorials, how-to guides

# ─── Domain route types (inter-cluster routes) ─────────────────────────────
route_types:
  - excitatory      # strengthens retrieval weight
  - inhibitory      # suppresses conflicting docs
  - modulatory      # adjusts rerank score
  - associative     # default cross-link
  - commissural     # cluster-to-cluster bridge

# ─── Advanced relationship types (GraphRAG edges) ─────────────────────────
relationship_types:
  core:
    - related
    - depends_on
    - uses
    - implements
    - calls
    - see_also
  advanced:
    - extends
    - validates
    - contradicts
    - synthesizes
    - triggers
    - inhibits
    - supersedes
    - derived_from
    - tested_by
    - deployed_via

# ─── Knowledge hub registry (expanded) ─────────────────────────────────────
hub_registry:
  - slug: auth_service
    cluster: security
    tier: executive
  - slug: indexing_pipeline
    cluster: data
    tier: association
  - slug: graphrag_engine
    cluster: routing
    tier: executive
  - slug: payment_service
    cluster: architecture
    tier: executive
  - slug: ci_cd_platform
    cluster: automation
    tier: operations
  - slug: coltex_knowledge_core
    cluster: architecture
    tier: governance
  - slug: vector_store_cluster
    cluster: data
    tier: association
  - slug: embedding_service
    cluster: retrieval
    tier: ingestion
  - slug: agent_orchestrator
    cluster: architecture
    tier: executive
  - slug: observability_stack
    cluster: observability
    tier: association
  - slug: rag_retrieval_core
    cluster: retrieval
    tier: executive
  - slug: security_operations
    cluster: priority
    tier: operations
  - slug: data_pipeline
    cluster: data
    tier: association
  - slug: llm_inference_gateway
    cluster: retrieval
    tier: executive
  - slug: knowledge_graph_store
    cluster: routing
    tier: association
  - slug: incident_command
    cluster: priority
    tier: operations
  - slug: ml_training_pipeline
    cluster: observability
    tier: association
  - slug: api_gateway
    cluster: architecture
    tier: executive

# ─── Scale targets ─────────────────────────────────────────────────────────
scale:
  domains: 62
  hubs: 18
  functional_clusters: 10
  processing_layers: 6
  memory_tiers: 4
  route_types: 5
  relationship_types: 16
  target_documents: 250000
  target_graph_edges: 1000000
