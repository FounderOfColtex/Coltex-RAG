# Coltex Premium RAG Dataset — $1000+ tier
# 100,000,000,000× hyper-scale distributable corpus
# Original synthetic content · Apache-2.0 · compliance-audited

name: Coltex Premium RAG Dataset
version: 2.1.0
tier: premium
price_usd: 1000
license: Apache-2.0
updated: 2026-07-07

# Hyper-scale generation (procedural streaming — no memory blowup)
generation:
  mega_multiplier: 100000000000    # 100 billion× tier
  scale: 10000
  variations_per_doc: 32
  max_files: 0                     # 0 = uncapped (run on Vast.ai)
  sample_md_files: 10000           # audit samples written to disk
  sample_dir: knowledge-base/distributable/_samples
  streaming: true
  categories:
    - rag
    - graphrag
    - agentic
    - python
    - java
    - javascript
    - typescript
    - go
    - rust
    - sql
    - postgresql
    - mongodb
    - redis
    - docker
    - kubernetes
    - aws
    - azure
    - gcp
    - microservices
    - security
    - architecture
    - api_design
    - ci_cd
    - testing
    - incidents
    - performance

# Knowledge sources: seed CHUNK docs + streamed premium corpus
knowledge_base:
  paths:
    - knowledge-base
    - knowledge-base/distributable/_samples
  glob: "**/*.md"
  exclude:
    - "**/generated/**"
    - "**/_seed/**"
    - "**/_excluded_from_distribution/**"

distribution:
  require_kb_license: true
  require_provenance: true
  require_notice: true
  forbidden_body_markers:
    - "This document provides detailed information on"
  min_substantive_chars: 200
  forbidden_source_patterns:
    - "wikipedia.org"
    - "stackoverflow.com"
    - "docs.python.org"
    - "kubernetes.io/docs"
    - "huggingface.co/docs"
    - "python.langchain.com"
    - "all rights reserved"

quality:
  min_chunk_chars: 40
  max_duplicate_ratio: 0.05
  require_metadata_fields:
    - doc_id
    - title
  require_license_header: true
  curated_only: false
  streaming_mode: true

chunking:
  max_chunk_chars: 2000
  overlap_chars: 200
  split_on: "## "

embeddings:
  model: sentence-transformers/all-MiniLM-L6-v2
  output_dir: data/product/embeddings
  batch_size: 128
  max_chunks: 500000              # cap for local builds; remove on cluster

output:
  base_dir: data/product
  chunks: data/product/chunks/chunks.jsonl
  catalog: data/product/catalog.jsonl
  graph: data/product/graph/edges.jsonl
  metadata: data/product/metadata/documents.json
  manifest: data/product/manifest.json
  generation_stats: data/product/generation_stats.json

benchmarks:
  output_dir: benchmarks
  min_faq_pairs: 500
  include_rag_eval: true
  include_retrieval_gold: true
  sample_from_catalog: 10000

evaluation:
  top_k: 8
  min_retrieval_recall: 0.45
  min_metadata_accuracy: 0.90
  sample_size: 300
