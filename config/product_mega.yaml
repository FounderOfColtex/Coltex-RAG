# Coltex Mega RAG — commercial 100,000,000+ document build
# Primary sellable SKU configuration

name: Coltex Mega RAG
version: 5.0.0
tier: mega
sku: MEGA-100M
license: EULA
license_path: EULA.md
commercial_license: MEGA-LICENSE.md
updated: 2026-07-09
tagline: The largest commercial RAG corpus — 100,000,000+ sellable knowledge files

# Mega-scale generation (procedural streaming — memory-safe)
generation:
  mega_multiplier: 100000000       # mega_plus tier → 100M+ documents
  scale: 10000
  variations_per_doc: 24
  max_files: 0                     # 0 = uncapped (run on cluster / Vast.ai)
  target_documents: 100000000      # commercial floor
  sample_md_files: 10000           # audit samples written to disk
  sample_dir: knowledge-base/distributable/_samples
  streaming: true
  sellable: true
  categories:
    - rag
    - graphrag
    - agentic
    - chunking
    - embeddings
    - vector_stores
    - vector_search
    - retrieval
    - indexing
    - fine_tuning
    - prompt_engineering
    - tool_use
    - memory
    - python
    - java
    - javascript
    - typescript
    - go
    - rust
    - sql
    - csharp
    - postgresql
    - mongodb
    - redis
    - mysql
    - docker
    - kubernetes
    - aws
    - azure
    - gcp
    - terraform
    - ci_cd
    - linux
    - microservices
    - event_driven
    - architecture
    - api_design
    - domain_driven_design
    - security
    - observability
    - testing
    - performance
    - code_review
    - incidents
    - data_quality
    - mlops
    - git
    - github_actions
    - nginx
    - bash

# Knowledge sources: seed CHUNK docs + streamed Mega corpus
knowledge_base:
  paths:
    - knowledge-base
    - knowledge-base/distributable/_samples
  glob: "**/*.md"
  exclude:
    - "**/generated/**"
    - "**/_seed/**"
    - "**/_excluded_from_distribution/**"

distribution:
  require_license: true
  require_provenance: true
  require_notice: true
  require_eula: true
  license_path: EULA.md
  commercial_license_path: MEGA-LICENSE.md
  forbidden_body_markers:
    - "This document provides detailed information on"
  min_substantive_chars: 200
  forbidden_source_patterns:
    - "wikipedia.org"
    - "stackoverflow.com"
    - "docs.python.org"
    - "kubernetes.io/docs"
    - "huggingface.co/docs"
    - "python.langchain.com"
    - "all rights reserved"

quality:
  min_chunk_chars: 40
  max_duplicate_ratio: 0.05
  require_metadata_fields:
    - doc_id
    - title
  curated_only: false
  streaming_mode: true

chunking:
  max_chunk_chars: 2000
  overlap_chars: 200
  split_on: "## "

embeddings:
  model: sentence-transformers/all-MiniLM-L6-v2
  output_dir: data/product/embeddings
  batch_size: 128
  max_chunks: 500000              # cap for local builds; remove on cluster

output:
  base_dir: data/product
  chunks: data/product/chunks/chunks.jsonl
  catalog: data/product/catalog.jsonl
  graph: data/product/graph/edges.jsonl
  metadata: data/product/metadata/documents.json
  manifest: data/product/manifest.json
  generation_stats: data/product/generation_stats.json
  marketplace_catalog: data/product/marketplace/packs.json

marketplace:
  enabled: true
  min_pack_documents: 100000
  sellable_packs:
    - pack-rag-core
    - pack-languages
    - pack-cloud-devops
    - pack-security-sre
    - pack-architecture

benchmarks:
  output_dir: benchmarks
  min_faq_pairs: 500
  include_rag_eval: true
  include_retrieval_gold: true
  sample_from_catalog: 15000

evaluation:
  top_k: 8
  min_retrieval_recall: 0.45
  min_metadata_accuracy: 0.90
  sample_size: 300
